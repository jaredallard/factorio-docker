# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: factorio-docker
report_sizes: true
metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
builds:
  - main: ./cmd/downloader
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      ## <<Stencil::Block(downloaderLdflags)>>

      ## <</Stencil::Block>>
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
      ## <<Stencil::Block(downloaderExtraArch)>>

      ## <</Stencil::Block>>
    goos:
      - linux
      - darwin
      - windows
      ## <<Stencil::Block(downloaderExtraOS)>>

      ## <</Stencil::Block>>
    ignore:
      - goos: windows
        goarch: arm
    mod_timestamp: "{{ .CommitTimestamp }}"
  - main: ./cmd/wrapper
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      ## <<Stencil::Block(wrapperLdflags)>>

      ## <</Stencil::Block>>
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
      ## <<Stencil::Block(wrapperExtraArch)>>

      ## <</Stencil::Block>>
    goos:
      - linux
      - darwin
      - windows
      ## <<Stencil::Block(wrapperExtraOS)>>

      ## <</Stencil::Block>>
    ignore:
      - goos: windows
        goarch: arm
    mod_timestamp: "{{ .CommitTimestamp }}"
dockers_v2:
  - images:
      ## <<Stencil::Block(extraReleaseOpts)>>
      - git.rgst.io/jaredallard/{{ .ProjectName }}
      - ghcr.io/jaredallard/{{ .ProjectName }}
      ## <</Stencil::Block>>
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "{{ .ProjectName }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.licenses": "AGPL-3.0"
    platforms:
      - linux/amd64
      - linux/arm64
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  use: git
release:
  gitea:
    owner: jaredallard
    name: factorio-docker

  prerelease: "auto"
  footer: |-
    **Full Changelog**: https://git.rgst.io/jaredallard/factorio-docker/compare/{{ .PreviousTag }}...{{ .Tag }}

gitea_urls:
  api: https://git.rgst.io/api/v1
  download: https://git.rgst.io

## <<Stencil::Block(extraReleaseOpts)>>

## <</Stencil::Block>>
